name: Cleanup Failed Workflow Runs

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  delete-failed-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Failed Workflow Runs
        uses: actions/github-script@v7
        with:
          script: |
            const repo = context.repo;
            
            // Get all failed workflow runs
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: repo.owner,
              repo: repo.repo,
              status: 'failure',
              per_page: 100
            });
            
            console.log(`Found ${runs.data.workflow_runs.length} failed runs`);
            
            // Delete each failed run
            for (const run of runs.data.workflow_runs) {
              try {
                await github.rest.actions.deleteWorkflowRun({
                  owner: repo.owner,
                  repo: repo.repo,
                  run_id: run.id
                });
                console.log(`✓ Deleted run #${run.id}: ${run.name}`);
              } catch (error) {
                console.log(`✗ Error deleting run #${run.id}: ${error.message}`);
              }
            }
            
            console.log('Cleanup completed!');
